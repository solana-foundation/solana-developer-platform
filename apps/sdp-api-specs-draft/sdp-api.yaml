  # ============================================
  # TRANSACTIONS API
  # ============================================
  #
  # Transaction Lifecycle:
  #
  # For CLIENT-SIDE signing (user wallet):
  #   1. POST /transactions/prepare  → Get unsigned tx
  #   2. Sign with wallet adapter
  #   3. POST /transactions/send OR submit via RPC
  #
  # For SERVER-SIDE signing (custody):
  #   1. POST /transactions/sign  → Get signed tx (don't send)
  #   2. POST /transactions/send  → Sign and send in one step
  #
  # For ANY transaction:
  #   - POST /transactions/simulate  → Test without sending
  #   - GET  /transactions/{sig}     → Check status
  #

  /transactions/prepare:
    post:
      tags: [Transactions]
      summary: Prepare Transaction (Unsigned)
      description: |
        Builds an unsigned transaction from a transaction intent.

        This is the low-level primitive for building any transaction type.
        Higher-level endpoints like `/payments/transfers/prepare` use this internally.

        **Use this endpoint when:**
        - Building custom transaction flows
        - Need fine-grained control over transaction construction
        - Implementing Solana Actions/Blinks patterns

        **Intent types supported:**
        - `transfer` - SOL or token transfer
        - `token_mint` - Mint tokens
        - `token_burn` - Burn tokens
        - `token_transfer` - SPL token transfer
        - `stake` - Stake SOL
        - `unstake` - Unstake SOL
        - `swap` - Token swap (via Jupiter, etc.)
        - `custom` - Raw instructions

        **Example flow:**
        ```typescript
        // 1. Prepare unsigned transaction
        const { transaction } = await sdp.transactions.prepare({
          intent: { type: 'transfer', params: { from, to, amount } }
        });

        // 2. Deserialize and sign
        const tx = VersionedTransaction.deserialize(
          Buffer.from(transaction.serialized, 'base64')
        );
        const signed = await wallet.signTransaction(tx);

        // 3. Submit
        const sig = await connection.sendRawTransaction(signed.serialize());
        ```
      operationId: prepareTransaction
      parameters:
        - $ref: '#/components/parameters/environmentHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrepareTransactionRequest'
            examples:
              transfer:
                summary: Prepare a transfer
                value:
                  intent:
                    type: transfer
                    params:
                      from: "4Nd1mBQtrMJVYVfKf2PJy9NZUZdTAsp7D4xWLs4gDB4T"
                      to: "7kbnvuGBxxj8AG9qp8Scn56muWGaRaFqxg1FsRp3PaFT"
                      amount: "1000000"
                      mint: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
                  options:
                    priorityFee: "medium"
                    simulate: true
              mint:
                summary: Prepare a token mint
                value:
                  intent:
                    type: token_mint
                    params:
                      tokenId: "tok_abc123"
                      recipient: "7kbnvuGBxxj8AG9qp8Scn56muWGaRaFqxg1FsRp3PaFT"
                      amount: "1000000"
      responses:
        '200':
          description: Unsigned transaction prepared successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PrepareTransactionResponse'
              example:
                data:
                  transaction:
                    serialized: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDArczbMia..."
                    message: "AQABAgIAAA..."
                    recentBlockhash: "GHtXQBsoZHVnNFa9YevAzFr17DJjgHXk3ycTKD5xD3Zi"
                    lastValidBlockHeight: 150000000
                  simulation:
                    success: true
                    unitsConsumed: 200
                    logs: ["Program 11111111111111111111111111111111 invoke [1]"]
                  estimatedFee: 5000
                  intent:
                    type: transfer
                    params:
                      from: "4Nd1mBQtrMJVYVfKf2PJy9NZUZdTAsp7D4xWLs4gDB4T"
                      to: "7kbnvuGBxxj8AG9qp8Scn56muWGaRaFqxg1FsRp3PaFT"
                      amount: "1000000"
                meta:
                  requestId: req_abc123
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /transactions/send:
    post:
      tags: [Transactions]
      summary: Sign and Send Transaction
      description: |
        Signs an unsigned transaction using the specified wallet's custody provider and sends it to the network.
        This is the low-level primitive that higher-level operations (transfers, mints) use internally.
        Enables services to implement SDP signing directly without JSONRPC intermediaries.
      operationId: sendTransaction
      parameters:
        - $ref: '#/components/parameters/environmentHeader'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendTransactionRequest'
            example:
              wallet: "wal_abc123"
              transaction: "AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDArczbMia..."
              options:
                skipPreflight: false
                preflightCommitment: "confirmed"
                priorityFee: "auto"
      responses:
        '200':
          description: Transaction sent successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TransactionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /transactions/sign:
    post:
      tags: [Transactions]
      summary: Sign Transaction
      description: |
        Signs a transaction using the wallet's custody provider but does NOT send it.
        Returns the signed transaction for the caller to send via their own infrastructure.
        Useful for services that want SDP custody but handle their own transaction submission.
      operationId: signTransaction
      parameters:
        - $ref: '#/components/parameters/environmentHeader'
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignTransactionRequest'
      responses:
        '200':
          description: Transaction signed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SignedTransaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Wallet not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /transactions/simulate:
    post:
      tags: [Transactions]
      summary: Simulate Transaction
      description: |
        Simulates a transaction without sending it to the network.
        Returns compute units consumed, logs, and any errors.
