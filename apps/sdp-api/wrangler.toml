name = "sdp-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "sdp-db"
database_id = "local"
migrations_dir = "src/db/migrations"

# KV Namespaces
[[kv_namespaces]]
binding = "SDP_API_KEYS"
id = "local-api-keys"

[[kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "local-rate-limits"

[[kv_namespaces]]
binding = "SDP_CACHE"
id = "local-cache"

[vars]
ENVIRONMENT = "development"
API_VERSION = "v1"

# Staging environment
[env.staging]
name = "sdp-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "sdp-db-staging"
database_id = "YOUR_STAGING_DB_ID"
migrations_dir = "src/db/migrations"

[[env.staging.kv_namespaces]]
binding = "SDP_API_KEYS"
id = "YOUR_STAGING_KV_ID"

[[env.staging.kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "YOUR_STAGING_RATELIMIT_KV_ID"

[[env.staging.kv_namespaces]]
binding = "SDP_CACHE"
id = "YOUR_STAGING_CACHE_KV_ID"

[env.staging.vars]
ENVIRONMENT = "staging"
API_VERSION = "v1"

# Production environment
[env.production]
name = "sdp-api-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "sdp-db-production"
database_id = "YOUR_PRODUCTION_DB_ID"
migrations_dir = "src/db/migrations"

[[env.production.kv_namespaces]]
binding = "SDP_API_KEYS"
id = "YOUR_PRODUCTION_KV_ID"

[[env.production.kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "YOUR_PRODUCTION_RATELIMIT_KV_ID"

[[env.production.kv_namespaces]]
binding = "SDP_CACHE"
id = "YOUR_PRODUCTION_CACHE_KV_ID"

[env.production.vars]
ENVIRONMENT = "production"
API_VERSION = "v1"
