name = "sdp-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Hyperdrive
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "00000000000000000000000000000000"
localConnectionString = "postgresql://sdp:sdp@127.0.0.1:5432/sdp"

# KV Namespaces
[[kv_namespaces]]
binding = "SDP_API_KEYS"
id = "local-api-keys"

[[kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "local-rate-limits"

[[kv_namespaces]]
binding = "SDP_CACHE"
id = "local-cache"

[[kv_namespaces]]
binding = "SDP_SESSIONS"
id = "local-sessions"

[triggers]
# Run every minute to reconcile pending/processing transfer statuses
crons = ["* * * * *"]

# Runtime identity for local `wrangler dev` only.
[vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
SDP_RUNTIME = "cloudflare"
EMAIL_FROM = "noreply@mail.solana.org"

# Dev environment
[env.dev]
name = "sdp-api-dev"
compatibility_flags = [
  "nodejs_compat",
  "no_handle_cross_request_promise_resolution",
]

[[env.dev.hyperdrive]]
binding = "HYPERDRIVE"
id = "your_dev_hyperdrive_id"

[[env.dev.kv_namespaces]]
binding = "SDP_API_KEYS"
id = "your_dev_api_keys_kv_id"

[[env.dev.kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "your_dev_rate_limits_kv_id"

[[env.dev.kv_namespaces]]
binding = "SDP_CACHE"
id = "your_dev_cache_kv_id"

[[env.dev.kv_namespaces]]
binding = "SDP_SESSIONS"
id = "your_dev_sessions_kv_id"

# Deploys render the remaining vars from Doppler (scripts/render-wrangler-config.mjs).
[env.dev.vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
SDP_RUNTIME = "cloudflare"
EMAIL_FROM = "noreply@mail.solana.org"

[env.production]
name = "sdp-api-production"
compatibility_flags = [
  "nodejs_compat",
  "no_handle_cross_request_promise_resolution",
]

[[env.production.hyperdrive]]
binding = "HYPERDRIVE"
id = "your_production_hyperdrive_id"

[[env.production.kv_namespaces]]
binding = "SDP_API_KEYS"
id = "your_production_api_keys_kv_id"

[[env.production.kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "your_production_rate_limits_kv_id"

[[env.production.kv_namespaces]]
binding = "SDP_CACHE"
id = "your_production_cache_kv_id"

[[env.production.kv_namespaces]]
binding = "SDP_SESSIONS"
id = "your_production_sessions_kv_id"

[env.production.vars]
ENVIRONMENT = "production"
API_VERSION = "v1"
SDP_RUNTIME = "cloudflare"
EMAIL_FROM = "noreply@mail.solana.org"
