name = "sdp-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "sdp-db"
database_id = "local"
migrations_dir = "src/db/migrations"

# KV Namespaces
[[kv_namespaces]]
binding = "SDP_API_KEYS"
id = "local-api-keys"

[[kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "local-rate-limits"

[[kv_namespaces]]
binding = "SDP_CACHE"
id = "local-cache"

[[kv_namespaces]]
binding = "SDP_SESSIONS"
id = "local-sessions"

[vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
EMAIL_FROM = "noreply@mail.solana.org"
# Local-only defaults for invitation redirects are defined in .dev.vars (see .dev.vars.example).

# Dev environment
[env.dev]
name = "sdp-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "sdp-db-dev"
database_id = "9e6d2e56-8e3d-47fc-8f8a-50db03d1cacc"
migrations_dir = "src/db/migrations"

[[env.dev.kv_namespaces]]
binding = "SDP_API_KEYS"
id = "0aed6bde7a5a49589f1696ae719c1586"

[[env.dev.kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "261d95813340417380d9ba317403b6bd"

[[env.dev.kv_namespaces]]
binding = "SDP_CACHE"
id = "628af2da2be8447b81848ba26ea0977d"

[[env.dev.kv_namespaces]]
binding = "SDP_SESSIONS"
id = "56172f4bd6484367af2eaf0039246802"

[env.dev.vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
EMAIL_FROM = "noreply@mail.solana.org"
# Set FRONTEND_URL and/or CLERK_INVITATION_REDIRECT_URL in Cloudflare for this environment.
SOLANA_NETWORK = "devnet"
SOLANA_RPC_URL = "https://api.devnet.solana.com"
FEE_PAYMENT_PROVIDER = "kora"
KORA_RPC_URL = "https://kora-devnet-315956366746.us-central1.run.app"

