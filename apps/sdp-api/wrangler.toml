name = "sdp-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "sdp-db"
database_id = "local"
migrations_dir = "src/db/migrations"

# KV Namespaces
[[kv_namespaces]]
binding = "SDP_API_KEYS"
id = "local-api-keys"

[[kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "local-rate-limits"

[[kv_namespaces]]
binding = "SDP_CACHE"
id = "local-cache"

[[kv_namespaces]]
binding = "SDP_SESSIONS"
id = "local-sessions"

[triggers]
# Run every minute to reconcile pending/processing transfer statuses
crons = ["* * * * *"]

[vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
EMAIL_FROM = "noreply@mail.solana.org"
SOLANA_NETWORK = "devnet"
SOLANA_RPC_URL = "https://api.devnet.solana.com"
SOLANA_RPC_DEFAULT_PROVIDER = "default"
SOLANA_RPC_TRITON_URL = "https://solanaf-sdp-7436.devnet.rpcpool.com/50cc5df4-1953-414c-b6fb-948aa7ffb0fb"
# Local dev defaults. Can be overridden by apps/sdp-api/.dev.vars.
FEE_PAYMENT_PROVIDER = "kora"
KORA_RPC_URL = "https://kora-devnet-315956366746.us-central1.run.app"

# Dev environment
[env.dev]
name = "sdp-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "sdp-db-dev"
database_id = "9e6d2e56-8e3d-47fc-8f8a-50db03d1cacc"
migrations_dir = "src/db/migrations"

[[env.dev.kv_namespaces]]
binding = "SDP_API_KEYS"
id = "0aed6bde7a5a49589f1696ae719c1586"

[[env.dev.kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "261d95813340417380d9ba317403b6bd"

[[env.dev.kv_namespaces]]
binding = "SDP_CACHE"
id = "628af2da2be8447b81848ba26ea0977d"

[[env.dev.kv_namespaces]]
binding = "SDP_SESSIONS"
id = "56172f4bd6484367af2eaf0039246802"

[env.dev.vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
EMAIL_FROM = "noreply@mail.solana.org"
SOLANA_NETWORK = "devnet"
SOLANA_RPC_URL = "https://api.devnet.solana.com"
SOLANA_RPC_DEFAULT_PROVIDER = "default"
SOLANA_RPC_ALCHEMY_URL = "https://solana-devnet.g.alchemy.com/v2/{API_KEY}"
SOLANA_RPC_TRITON_URL = "https://solanaf-sdp-7436.devnet.rpcpool.com/50cc5df4-1953-414c-b6fb-948aa7ffb0fb"
SOLANA_RPC_HELIUS_URL = "https://devnet.helius-rpc.com/?api-key={API_KEY}"
SOLANA_RPC_QUICKNODE_URL = "https://evocative-old-mansion.solana-devnet.quiknode.pro/{API_KEY}"
FEE_PAYMENT_PROVIDER = "kora"
KORA_RPC_URL = "https://kora-devnet-315956366746.us-central1.run.app"

