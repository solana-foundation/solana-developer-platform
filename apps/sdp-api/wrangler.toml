name = "sdp-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "sdp-db"
database_id = "local"
migrations_dir = "src/db/migrations"

# KV Namespaces
[[kv_namespaces]]
binding = "SDP_API_KEYS"
id = "local-api-keys"

[[kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "local-rate-limits"

[[kv_namespaces]]
binding = "SDP_CACHE"
id = "local-cache"

[[kv_namespaces]]
binding = "SDP_SESSIONS"
id = "local-sessions"

[vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
EMAIL_FROM = "noreply@mail.solana.org"

# Dev environment
[env.dev]
name = "sdp-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "sdp-db-dev"
database_id = "eb2253d1-ea79-4c8d-bc17-54714253ab37"
migrations_dir = "src/db/migrations"

[[env.dev.kv_namespaces]]
binding = "SDP_API_KEYS"
id = "8a9ee45dcb21427d84dc70417abc7d7d"

[[env.dev.kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "06ae0aa312ac4135961131c77f600995"

[[env.dev.kv_namespaces]]
binding = "SDP_CACHE"
id = "83637da8fc7a4da6bd9301167888805f"

[[env.dev.kv_namespaces]]
binding = "SDP_SESSIONS"
id = "07f1847404084b69bb7a703bae4ef009"

[env.dev.vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
SOLANA_NETWORK = "devnet"
SOLANA_RPC_URL = "https://api.devnet.solana.com"
FEE_PAYMENT_PROVIDER = "kora"
KORA_RPC_URL = "https://kora-devnet-315956366746.us-central1.run.app"

# QA / staging environment
[env.staging]
name = "sdp-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "sdp-db-staging"
database_id = "YOUR_STAGING_DB_ID"
migrations_dir = "src/db/migrations"

[[env.staging.kv_namespaces]]
binding = "SDP_API_KEYS"
id = "YOUR_STAGING_KV_ID"

[[env.staging.kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "YOUR_STAGING_RATELIMIT_KV_ID"

[[env.staging.kv_namespaces]]
binding = "SDP_CACHE"
id = "YOUR_STAGING_CACHE_KV_ID"

[[env.staging.kv_namespaces]]
binding = "SDP_SESSIONS"
id = "YOUR_STAGING_SESSIONS_KV_ID"

[env.staging.vars]
ENVIRONMENT = "staging"
API_VERSION = "v1"
EMAIL_FROM = "noreply@mail.solana.org"

# Production environment
[env.production]
name = "sdp-api-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "sdp-db-production"
database_id = "YOUR_PRODUCTION_DB_ID"
migrations_dir = "src/db/migrations"

[[env.production.kv_namespaces]]
binding = "SDP_API_KEYS"
id = "YOUR_PRODUCTION_KV_ID"

[[env.production.kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "YOUR_PRODUCTION_RATELIMIT_KV_ID"

[[env.production.kv_namespaces]]
binding = "SDP_CACHE"
id = "YOUR_PRODUCTION_CACHE_KV_ID"

[[env.production.kv_namespaces]]
binding = "SDP_SESSIONS"
id = "YOUR_PRODUCTION_SESSIONS_KV_ID"

[env.production.vars]
ENVIRONMENT = "production"
API_VERSION = "v1"
