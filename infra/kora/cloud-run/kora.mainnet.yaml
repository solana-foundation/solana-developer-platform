apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: kora-mainnet
  labels:
    app: kora
    env: mainnet
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      # Replace with your runtime service account.
      # It should have Secret Manager access (secretAccessor) for the secrets below.
      serviceAccountName: kora-runtime@YOUR_GCP_PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: us-central1-docker.pkg.dev/YOUR_GCP_PROJECT_ID/kora-remote/solana-foundation/kora:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: RUST_LOG
              value: info
            - name: RPC_URL
              valueFrom:
                secretKeyRef:
                  name: kora-mainnet-rpc-url
                  key: latest
            - name: SIGNER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: kora-mainnet-signer-private-key
                  key: latest
          command:
            - kora
          args:
            - --config
            - /app/config/kora.toml
            - rpc
            - start
            - --signers-config
            - /app/signers/signers.toml
          volumeMounts:
            - name: kora-config
              mountPath: /app/config
              readOnly: true
            - name: kora-signers
              mountPath: /app/signers
              readOnly: true
      volumes:
        - name: kora-config
          secret:
            secretName: kora-mainnet-config
            items:
              - key: latest
                path: kora.toml
        - name: kora-signers
          secret:
            secretName: kora-mainnet-signers
            items:
              - key: latest
                path: signers.toml
