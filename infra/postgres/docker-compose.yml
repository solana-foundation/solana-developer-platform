name: solana-developer-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sdp
      POSTGRES_USER: sdp
      POSTGRES_PASSWORD: sdp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdp -d sdp"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - sdp-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  sdp-postgres-data:
