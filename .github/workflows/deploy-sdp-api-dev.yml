name: Deploy SDP API (dev)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-sdp-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    environment: ${{ matrix.target.name }}
    strategy:
      matrix:
        target:
          - name: dev
            deploy_script: deploy:dev
            migrate_script: db:migrate:dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Migrate D1
        run: pnpm --filter @sdp/api ${{ matrix.target.migrate_script }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: pnpm --filter @sdp/api ${{ matrix.target.deploy_script }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
