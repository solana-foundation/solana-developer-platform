name: Deploy SDP API (dev)

on:
  push:
    branches:
      - main
    paths:
      - apps/sdp-api/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-sdp-api-dev.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-sdp-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    environment: ${{ matrix.target.name }}
    strategy:
      matrix:
        target:
          - name: dev
            deploy_script: deploy:dev
            migrate_script: db:migrate:dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Migrate D1
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/sdp-api
          command: d1 migrations apply DB --env dev --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/sdp-api
          command: deploy --env dev
