name: Deploy SDP API

on:
  push:
    branches:
      - main
    paths:
      - apps/sdp-api/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-sdp-api.yml
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - dev
          - staging
          - production
        default: dev
        required: true
      ref:
        description: "Git ref to deploy (commit SHA, tag, or branch)"
        type: string
        required: false
      run_migrations:
        description: "Run D1 migrations before deploy"
        type: boolean
        default: true
        required: false

permissions:
  contents: read

concurrency:
  group: deploy-sdp-api-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Migrate D1
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_migrations }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/sdp-api
          command: d1 migrations apply DB --env ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }} --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/sdp-api
          command: deploy --env ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
