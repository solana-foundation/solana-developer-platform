name: Deploy SDP API

on:
  push:
    branches:
      - main
    tags:
      # NOTE: paths filters do not apply to tag pushes; every matching tag
      # intentionally triggers a production deploy for that release version.
      - v*.*.*
    paths:
      - apps/sdp-api/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/deploy-sdp-api.yml
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - dev
          - production
        default: dev
        required: true
      ref:
        description: "Git ref to deploy (commit SHA, tag, or branch)"
        type: string
        required: false
      run_migrations:
        description: "Run D1 migrations before deploy"
        type: boolean
        default: false
        required: false

permissions:
  contents: read

concurrency:
  group: deploy-sdp-api-${{ github.event_name == 'workflow_dispatch' && inputs.environment || startsWith(github.ref, 'refs/tags/v') && 'production' || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ github.event_name == 'workflow_dispatch' && inputs.environment || startsWith(github.ref, 'refs/tags/v') && 'production' || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || startsWith(github.ref, 'refs/tags/v') && 'production' || 'dev' }}
    env:
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || startsWith(github.ref, 'refs/tags/v') && 'production' || 'dev' }}
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.sha }}

    steps:
      - name: Validate production tag input
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'production' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          if [[ -z "${INPUT_REF}" ]]; then
            echo "Manual production deploys require ref=vX.Y.Z." >&2
            exit 1
          fi

          if [[ ! "${INPUT_REF}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Production ref must be an existing semver tag like v1.2.3." >&2
            exit 1
          fi

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if ! git ls-remote --tags --refs "${REPO_URL}" "refs/tags/${INPUT_REF}" | grep -q .; then
            echo "Tag ${INPUT_REF} does not exist in ${GITHUB_REPOSITORY}." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEPLOY_REF }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Migrate D1
        if: ${{ github.event_name == 'push' || inputs.run_migrations }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/sdp-api
          command: d1 migrations apply DB --env ${{ env.TARGET_ENV }} --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/sdp-api
          command: deploy --env ${{ env.TARGET_ENV }}
