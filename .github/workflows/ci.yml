name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: |
          git diff --name-only --diff-filter=d -z origin/main...HEAD \
            | xargs -0 --no-run-if-empty pnpm exec biome check --no-errors-on-unmatched

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Detect changed packages
        id: changed
        run: |
          CHANGED_PACKAGES=$(git diff --name-only origin/main...HEAD | awk -F/ '/^(apps|packages)\\// {print $1 "/" $2}' | sort -u | tr '\n' ' ' | xargs)
          echo "packages=${CHANGED_PACKAGES}" >> "$GITHUB_OUTPUT"

      - name: Typecheck
        if: steps.changed.outputs.packages != ''
        run: |
          FILTERS=""
          for pkg in ${{ steps.changed.outputs.packages }}; do
            FILTERS="$FILTERS --filter ./$pkg"
          done
          pnpm --if-present $FILTERS typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      SOLANA_RPC_URL: ${{ vars.SOLANA_RPC_URL || secrets.SOLANA_RPC_URL || 'https://api.devnet.solana.com' }}
      SOLANA_RPC_DEFAULT_PROVIDER: ${{ vars.SOLANA_RPC_DEFAULT_PROVIDER || secrets.SOLANA_RPC_DEFAULT_PROVIDER || 'default' }}
      SOLANA_RPC_TRITON_URL: ${{ vars.SOLANA_RPC_TRITON_URL || secrets.SOLANA_RPC_TRITON_URL }}
      SOLANA_RPC_TRITON_API_KEY: ${{ secrets.SOLANA_RPC_TRITON_API_KEY }}
      SOLANA_RPC_HELIUS_URL: ${{ vars.SOLANA_RPC_HELIUS_URL || secrets.SOLANA_RPC_HELIUS_URL }}
      SOLANA_RPC_HELIUS_API_KEY: ${{ secrets.SOLANA_RPC_HELIUS_API_KEY }}
      SOLANA_RPC_ALCHEMY_URL: ${{ vars.SOLANA_RPC_ALCHEMY_URL || secrets.SOLANA_RPC_ALCHEMY_URL }}
      SOLANA_RPC_ALCHEMY_API_KEY: ${{ secrets.SOLANA_RPC_ALCHEMY_API_KEY }}
      SOLANA_RPC_QUICKNODE_URL: ${{ vars.SOLANA_RPC_QUICKNODE_URL || secrets.SOLANA_RPC_QUICKNODE_URL }}
      SOLANA_RPC_QUICKNODE_API_KEY: ${{ secrets.SOLANA_RPC_QUICKNODE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prepare API test vars
        run: |
          cat > apps/sdp-api/.dev.vars <<EOF
          SOLANA_RPC_URL=${SOLANA_RPC_URL}
          SOLANA_RPC_DEFAULT_PROVIDER=${SOLANA_RPC_DEFAULT_PROVIDER}
          SOLANA_RPC_TRITON_URL=${SOLANA_RPC_TRITON_URL}
          SOLANA_RPC_TRITON_API_KEY=${SOLANA_RPC_TRITON_API_KEY}
          SOLANA_RPC_HELIUS_URL=${SOLANA_RPC_HELIUS_URL}
          SOLANA_RPC_HELIUS_API_KEY=${SOLANA_RPC_HELIUS_API_KEY}
          SOLANA_RPC_ALCHEMY_URL=${SOLANA_RPC_ALCHEMY_URL}
          SOLANA_RPC_ALCHEMY_API_KEY=${SOLANA_RPC_ALCHEMY_API_KEY}
          SOLANA_RPC_QUICKNODE_URL=${SOLANA_RPC_QUICKNODE_URL}
          SOLANA_RPC_QUICKNODE_API_KEY=${SOLANA_RPC_QUICKNODE_API_KEY}
          EOF

      - name: Unit tests
        run: pnpm test

  build_api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build API (Wrangler dry-run)
        run: pnpm --filter ./apps/sdp-api build

  build_docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter sdp-docs build

  docs_integrity:
    name: Docs Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate public docs artifacts
        run: |
          pnpm --filter sdp-docs generate:api
          pnpm --filter sdp-docs generate:ai

      - name: Check docs links
        run: pnpm --filter sdp-docs check:links

  integration_tests:
    name: Integration Tests (Devnet/Kora)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Devnet configuration (override as needed via repository/organization secrets)
      SOLANA_NETWORK: devnet
      SOLANA_RPC_URL: ${{ vars.SOLANA_RPC_URL || secrets.SOLANA_RPC_URL || 'https://api.devnet.solana.com' }}

      # Kora configuration (override as needed)
      KORA_RPC_URL: ${{ secrets.KORA_RPC_URL }}
      KORA_API_KEY: ${{ secrets.KORA_API_KEY }}

      # Privy configuration for live wallet provisioning/signing integration checks
      PRIVY_APP_ID: ${{ vars.PRIVY_APP_ID || secrets.PRIVY_APP_ID }}
      PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
      PRIVY_API_BASE_URL: ${{ vars.PRIVY_API_BASE_URL || secrets.PRIVY_API_BASE_URL }}
      PRIVY_REQUEST_DELAY_MS: ${{ vars.PRIVY_REQUEST_DELAY_MS || secrets.PRIVY_REQUEST_DELAY_MS }}

      # Optional: tighten/loosen the fail-fast sponsor-funds check (lamports)
      KORA_MIN_BALANCE_LAMPORTS: ${{ secrets.KORA_MIN_BALANCE_LAMPORTS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate integration runtime secrets
        run: |
          if [ -z "${KORA_RPC_URL}" ]; then
            echo "KORA_RPC_URL must be set for integration tests" >&2
            exit 1
          fi
          if [ -z "${PRIVY_APP_ID}" ] || [ -z "${PRIVY_APP_SECRET}" ]; then
            echo "PRIVY_APP_ID and PRIVY_APP_SECRET must be set for integration tests" >&2
            exit 1
          fi

      - name: Integration tests
        run: pnpm test:integration

  issuance_e2e:
    name: Issuance E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_JWT_TEMPLATE: ${{ vars.CLERK_JWT_TEMPLATE || 'sdp-api' }}
      E2E_CLERK_ORG_NAME: ${{ vars.E2E_CLERK_ORG_NAME || 'Solana' }}
      E2E_CLERK_TEST_EMAIL: ${{ vars.E2E_CLERK_TEST_EMAIL || 'e2e-smoke+sdp-web@example.com' }}
      SOLANA_NETWORK: devnet
      SOLANA_RPC_URL: ${{ vars.SOLANA_RPC_URL || secrets.SOLANA_RPC_URL || 'https://api.devnet.solana.com' }}
      SOLANA_RPC_DEFAULT_PROVIDER: ${{ vars.SOLANA_RPC_DEFAULT_PROVIDER || secrets.SOLANA_RPC_DEFAULT_PROVIDER || 'default' }}
      SOLANA_RPC_TRITON_URL: ${{ vars.SOLANA_RPC_TRITON_URL || secrets.SOLANA_RPC_TRITON_URL }}
      SOLANA_RPC_TRITON_API_KEY: ${{ secrets.SOLANA_RPC_TRITON_API_KEY }}
      SOLANA_RPC_HELIUS_URL: ${{ vars.SOLANA_RPC_HELIUS_URL || secrets.SOLANA_RPC_HELIUS_URL }}
      SOLANA_RPC_HELIUS_API_KEY: ${{ secrets.SOLANA_RPC_HELIUS_API_KEY }}
      SOLANA_RPC_ALCHEMY_URL: ${{ vars.SOLANA_RPC_ALCHEMY_URL || secrets.SOLANA_RPC_ALCHEMY_URL }}
      SOLANA_RPC_ALCHEMY_API_KEY: ${{ secrets.SOLANA_RPC_ALCHEMY_API_KEY }}
      SOLANA_RPC_QUICKNODE_URL: ${{ vars.SOLANA_RPC_QUICKNODE_URL || secrets.SOLANA_RPC_QUICKNODE_URL }}
      SOLANA_RPC_QUICKNODE_API_KEY: ${{ secrets.SOLANA_RPC_QUICKNODE_API_KEY }}
      PRIVY_APP_ID: ${{ vars.PRIVY_APP_ID || secrets.PRIVY_APP_ID }}
      PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
      PRIVY_API_BASE_URL: ${{ vars.PRIVY_API_BASE_URL || secrets.PRIVY_API_BASE_URL }}
      PRIVY_REQUEST_DELAY_MS: ${{ vars.PRIVY_REQUEST_DELAY_MS || secrets.PRIVY_REQUEST_DELAY_MS }}
      KORA_RPC_URL: ${{ secrets.KORA_RPC_URL }}
      KORA_API_KEY: ${{ secrets.KORA_API_KEY }}
      API_KEY_PEPPER: ${{ secrets.API_KEY_PEPPER || 'playwright-ci-pepper' }}
      CUSTODY_ENCRYPTION_KEY: ${{ secrets.CUSTODY_ENCRYPTION_KEY }}
      PLAYWRIGHT_API_URL: http://127.0.0.1:8787
      PLAYWRIGHT_API_PORT: "8787"
      PLAYWRIGHT_API_PERSIST_PATH: .wrangler/state-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate issuance e2e runtime secrets
        run: |
          if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" ] || [ -z "${CLERK_SECRET_KEY}" ]; then
            echo "Clerk publishable and secret keys must be set for issuance e2e" >&2
            exit 1
          fi
          if [ -z "${PRIVY_APP_ID}" ] || [ -z "${PRIVY_APP_SECRET}" ]; then
            echo "PRIVY_APP_ID and PRIVY_APP_SECRET must be set for issuance e2e" >&2
            exit 1
          fi
          if [ -z "${KORA_RPC_URL}" ]; then
            echo "KORA_RPC_URL must be set for issuance e2e" >&2
            exit 1
          fi

      - name: Derive Clerk issuer for local API
        run: |
          CLERK_HOST=$(node - <<'NODE'
          const key = process.env.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || "";
          const encoded = key.split("_").slice(2).join("_");
          if (!encoded) {
            throw new Error("NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is required for issuance e2e");
          }
          const normalized = encoded.replace(/-/g, "+").replace(/_/g, "/");
          const padded = normalized + "=".repeat((4 - (normalized.length % 4)) % 4);
          const decoded = Buffer.from(padded, "base64").toString("utf8").replace(/\$/g, "").trim();
          if (!decoded) {
            throw new Error("Unable to derive Clerk frontend host from publishable key");
          }
          process.stdout.write(decoded);
          NODE
          )
          echo "CLERK_ISSUER=https://${CLERK_HOST}" >> "$GITHUB_ENV"
          echo "CLERK_JWKS_URL=https://${CLERK_HOST}/.well-known/jwks.json" >> "$GITHUB_ENV"
          echo "SDP_API_BASE_URL=http://127.0.0.1:8787" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SDP_API_BASE_URL=http://127.0.0.1:8787" >> "$GITHUB_ENV"

      - name: Prepare local API runtime vars
        run: |
          DEFAULT_CUSTODY_ENCRYPTION_KEY=$(node -e 'process.stdout.write(Buffer.alloc(32, 7).toString("base64"))')

          write_var() {
            local key="$1"
            local value="${2-}"
            if [ -n "$value" ]; then
              printf '%s=%s\n' "$key" "$value" >> apps/sdp-api/.dev.vars
            fi
          }

          : > apps/sdp-api/.dev.vars
          write_var CLERK_SECRET_KEY "${CLERK_SECRET_KEY}"
          write_var CLERK_ISSUER "${CLERK_ISSUER}"
          write_var CLERK_JWKS_URL "${CLERK_JWKS_URL}"
          write_var CLERK_JWT_TEMPLATE "${CLERK_JWT_TEMPLATE}"
          write_var FRONTEND_URL "http://localhost:3000"
          write_var PRIVY_APP_ID "${PRIVY_APP_ID}"
          write_var PRIVY_APP_SECRET "${PRIVY_APP_SECRET}"
          write_var PRIVY_API_BASE_URL "${PRIVY_API_BASE_URL:-https://api.privy.io/v1}"
          write_var PRIVY_REQUEST_DELAY_MS "${PRIVY_REQUEST_DELAY_MS}"
          write_var CUSTODY_ENCRYPTION_KEY "${CUSTODY_ENCRYPTION_KEY:-$DEFAULT_CUSTODY_ENCRYPTION_KEY}"
          write_var API_KEY_PEPPER "${API_KEY_PEPPER}"
          write_var SOLANA_NETWORK "${SOLANA_NETWORK}"
          write_var SOLANA_RPC_URL "${SOLANA_RPC_URL}"
          write_var SOLANA_RPC_DEFAULT_PROVIDER "${SOLANA_RPC_DEFAULT_PROVIDER}"
          write_var SOLANA_RPC_TRITON_URL "${SOLANA_RPC_TRITON_URL}"
          write_var SOLANA_RPC_TRITON_API_KEY "${SOLANA_RPC_TRITON_API_KEY}"
          write_var SOLANA_RPC_HELIUS_URL "${SOLANA_RPC_HELIUS_URL}"
          write_var SOLANA_RPC_HELIUS_API_KEY "${SOLANA_RPC_HELIUS_API_KEY}"
          write_var SOLANA_RPC_ALCHEMY_URL "${SOLANA_RPC_ALCHEMY_URL}"
          write_var SOLANA_RPC_ALCHEMY_API_KEY "${SOLANA_RPC_ALCHEMY_API_KEY}"
          write_var SOLANA_RPC_QUICKNODE_URL "${SOLANA_RPC_QUICKNODE_URL}"
          write_var SOLANA_RPC_QUICKNODE_API_KEY "${SOLANA_RPC_QUICKNODE_API_KEY}"
          write_var KORA_RPC_URL "${KORA_RPC_URL}"
          write_var KORA_API_KEY "${KORA_API_KEY}"
          write_var SIGNING_PROVIDER "privy"

      - name: Install Playwright browser
        run: pnpm --filter sdp-web exec playwright install --with-deps chromium

      - name: Run issuance e2e suite
        run: pnpm --filter sdp-web test:e2e:issuance

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            apps/sdp-web/playwright-report
            apps/sdp-web/test-results
          if-no-files-found: ignore
