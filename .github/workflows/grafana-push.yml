name: Grafana push (dashboards + alert rules)

on:
  push:
    branches: [main]
    paths:
      - 'dashboards/**'
      - 'alert-rules/**'
      - 'notification-policies/**'
      - 'scripts/grafana-sync.sh'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: grafana-push
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Gate live Grafana writes behind a GitHub Environment (add required reviewers / env-scoped DOPPLER_TOKEN).
    environment: grafana
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@014df23b1329b615816a38eb5f473bb9000700b1 # v3
      - name: Sync to Grafana
        run: doppler run --project solana-developer-platform --config prd -- scripts/grafana-sync.sh
