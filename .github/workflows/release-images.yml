name: Release Images

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: release-images-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        service: [sdp-api, sdp-web, sdp-docs]
    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/sdp/${{ matrix.service }}
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build multi-arch and push to a staging tag. Both platforms must pass
      # Trivy before the image is promoted to the release and :latest tags.
      - name: Build and push (staging)
        id: staging
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.VERSION }}-rc
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Scan amd64 (Trivy)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.GHCR_IMAGE }}:${{ env.VERSION }}-rc
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
        env:
          TRIVY_PLATFORM: linux/amd64

      - name: Scan arm64 (Trivy)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.GHCR_IMAGE }}:${{ env.VERSION }}-rc
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
        env:
          TRIVY_PLATFORM: linux/arm64

      # Both scans passed — promote the staging digest to release tags.
      - name: Promote to release tags
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${GHCR_IMAGE}:${VERSION}" \
            --tag "${GHCR_IMAGE}:latest" \
            "${GHCR_IMAGE}@${{ steps.staging.outputs.digest }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless OIDC)
        env:
          DIGEST: ${{ steps.staging.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${GHCR_IMAGE}@${DIGEST}"
