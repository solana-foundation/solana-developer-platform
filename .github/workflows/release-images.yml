name: Release Images

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: release-images-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        service: [sdp-api, sdp-web, sdp-docs]
    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/sdp/${{ matrix.service }}
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build each platform locally and scan before anything is pushed.
      - name: Build amd64 (local)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          load: true
          provenance: false
          sbom: false
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.GHCR_IMAGE }}:scan-amd64
          cache-from: type=gha,scope=${{ matrix.service }}

      - name: Scan amd64 (Trivy)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.GHCR_IMAGE }}:scan-amd64
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Build arm64 (local, QEMU)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/arm64
          load: true
          provenance: false
          sbom: false
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.GHCR_IMAGE }}:scan-arm64
          cache-from: type=gha,scope=${{ matrix.service }}

      - name: Scan arm64 (Trivy)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.GHCR_IMAGE }}:scan-arm64
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      # Both scans passed — multi-arch build and push. The GHA layer cache
      # may reuse work from earlier builds but is not guaranteed to hit the
      # local --load builds above (different driver).
      - name: Build and push (multi-arch)
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.VERSION }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless OIDC)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${GHCR_IMAGE}@${DIGEST}"
