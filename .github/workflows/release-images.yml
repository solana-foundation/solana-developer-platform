name: Release Images

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: release-images-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        service: [sdp-api, sdp-web, sdp-docs]
    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/sdp/${{ matrix.service }}
      AR_IMAGE: ${{ vars.GCP_AR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPOSITORY }}/${{ matrix.service }}
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Validate Artifact Registry configuration
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GCP_AR_LOCATION: ${{ vars.GCP_AR_LOCATION }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_AR_REPOSITORY: ${{ vars.GCP_AR_REPOSITORY }}
        run: |
          set -euo pipefail
          missing=0
          for name in GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT GCP_AR_LOCATION GCP_PROJECT_ID GCP_AR_REPOSITORY; do
            if [ -z "${!name:-}" ]; then
              echo "${name} must be configured as a repository or environment variable." >&2
              missing=1
            fi
          done
          [ "${missing}" -eq 0 ]

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ vars.GCP_AR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # One build, two registries. No NEXT_PUBLIC_* build args: web/docs keep
      # their placeholder defaults so the entrypoint can inject runtime values.
      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.VERSION }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.AR_IMAGE }}:${{ env.VERSION }}
            ${{ env.AR_IMAGE }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      # A CRITICAL finding fails the job before signing, so an unsigned image is
      # the signal not to deploy it.
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ env.GHCR_IMAGE }}@${{ steps.build.outputs.digest }}
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign images (keyless OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${GHCR_IMAGE}@${DIGEST}"
          cosign sign --yes "${AR_IMAGE}@${DIGEST}"
