name: Ramp Rails Drift

permissions:
  contents: read
  issues: write

on:
  pull_request_target:

jobs:
  ramp_rails_drift:
    name: Ramp Rails Drift
    runs-on: ubuntu-latest
    if: github.event.pull_request.author_association == 'COLLABORATOR'
    steps:
      - name: Checkout trusted base
        # v6 pinned to an immutable commit because this workflow runs with PR write permissions.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        # v6 pinned to an immutable commit because this workflow runs with PR write permissions.
        uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a
        with:
          version: 10.16.0

      - name: Setup Node
        # v6 pinned to an immutable commit because this workflow runs with PR write permissions.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate Doppler bootstrap secret
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI }}
        run: |
          if [ -z "${DOPPLER_TOKEN}" ]; then
            echo "DOPPLER_TOKEN_CI must be configured for ramp rails drift checks." >&2
            exit 1
          fi

      - name: Install Doppler CLI
        # v4 pinned to an immutable commit because this workflow uses Doppler secrets.
        uses: dopplerhq/cli-action@cdd4670c26c06688d7afe8ff3b76b1cac918f4da

      - name: Read PR generated support file
        env:
          HEAD_REPO_URL: ${{ github.event.pull_request.head.repo.clone_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CANDIDATE_PATH: ${{ github.workspace }}/apps/sdp-api/.ramp-rails/ramp-support.pr.generated.ts
        run: |
          mkdir -p "$(dirname "${CANDIDATE_PATH}")"
          git fetch --no-tags --depth=1 "${HEAD_REPO_URL}" "${HEAD_SHA}"
          if git show FETCH_HEAD:packages/sdp-types/src/generated/ramp-support.generated.ts > "${CANDIDATE_PATH}"; then
            echo "RAMP_RAILS_CANDIDATE_GENERATED_PATH=${CANDIDATE_PATH}" >> "${GITHUB_ENV}"
          else
            echo "RAMP_RAILS_CANDIDATE_GENERATED_PATH=${CANDIDATE_PATH}" >> "${GITHUB_ENV}"
            echo "" > "${CANDIDATE_PATH}"
          fi

      - name: Refresh ramp rails
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_CI }}
          DOPPLER_CONFIG: dev_ci
        run: pnpm --filter @sdp/api rails:discover --emit --strict

      - name: Build drift comment
        id: drift
        run: pnpm --filter @sdp/api rails:drift

      - name: Upsert drift PR comment
        # v8 pinned to an immutable commit because this workflow writes PR comments.
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          HAS_CHANGES: ${{ steps.drift.outputs.has_changes }}
          COMMENT_PATH: ${{ steps.drift.outputs.comment_path }}
        with:
          script: |
            const fs = require("node:fs/promises");
            const marker = "<!-- sdp-ramp-rails-drift -->";
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.data.find(
              (comment) => comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (process.env.HAS_CHANGES === "true") {
              const body = await fs.readFile(process.env.COMMENT_PATH, "utf8");
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } else if (existing) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: existing.id,
              });
            }
