# Deploy Kora by pinned image tag, with config mounted from Secret Manager (Terraform-owned).
#
# The pinned tag lives in .github/kora-image-tag and is bumped via PR. Merging the bump to main
# auto-deploys DEVNET then MAINNET (in that order; mainnet is skipped if devnet fails). The actual
# logic lives in infra/kora/cloud-run/{deploy,notify-slack}.sh — this workflow just wires auth + env.
#
# Per-env GitHub Environment (devnet/mainnet) provides DOPPLER_TOKEN + vars
# GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT, KORA_GCP_PROJECT.
name: Deploy Kora

on:
  push:
    branches: [main]
    paths:
      - '.github/kora-image-tag'
      - 'infra/kora/cloud-run/**'
      - 'infra/kora/terraform/**'
      - '.github/workflows/deploy-kora.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment(s)"
        type: choice
        options: [both, devnet, mainnet]
        default: both
        required: true
      image_sha:
        description: "Immutable kora image tag (git SHA) to deploy/roll back to; blank = use .github/kora-image-tag"
        type: string
        default: ""
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.pick.outputs.envs }}
    steps:
      - id: pick
        # push (a version bump) -> both envs; workflow_dispatch -> the chosen env(s).
        run: |
          sel="${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'both' }}"
          case "$sel" in
            devnet)  echo 'envs=["devnet"]' >> "$GITHUB_OUTPUT" ;;
            mainnet) echo 'envs=["mainnet"]' >> "$GITHUB_OUTPUT" ;;
            *)       echo 'envs=["devnet","mainnet"]' >> "$GITHUB_OUTPUT" ;;
          esac

  deploy:
    needs: plan
    # Ordered, one at a time: devnet first; if it fails, mainnet is cancelled (fail-fast).
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        env: ${{ fromJSON(needs.plan.outputs.envs) }}
    name: Deploy kora (${{ matrix.env }})
    runs-on: ubuntu-latest
    environment: ${{ matrix.env }}
    concurrency:
      group: deploy-kora-${{ matrix.env }}
      cancel-in-progress: false
    env:
      TARGET_ENV: ${{ matrix.env }}
      DOPPLER_PROJECT: solana-developer-platform
      DOPPLER_CONFIG: prd
      REGION: us-central1
    steps:
      - uses: actions/checkout@v4

      - name: Resolve pinned Kora image tag
        id: tag
        run: |
          set -euo pipefail
          # workflow_dispatch image_sha overrides the pinned file (manual deploy / rollback to any prior SHA)
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.image_sha || '' }}"
          [ -n "$TAG" ] || TAG="$(tr -d '[:space:]' < .github/kora-image-tag)"
          [ -n "$TAG" ] || { echo "::error::no image tag (input or .github/kora-image-tag)" >&2; exit 1; }
          case "$TAG" in latest|edge|beta) echo "::error::mutable tag '$TAG' not allowed — pin an immutable :<git-sha>" >&2; exit 1 ;; esac
          echo "kora_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@014df23b1329b615816a38eb5f473bb9000700b1 # v3
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Install gcrane
        uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # v0.4

      - name: Deploy
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          PROJECT: ${{ vars.KORA_GCP_PROJECT }}
          KORA_TAG: ${{ steps.tag.outputs.kora_tag }}
        run: |
          ENV="$TARGET_ENV" PROJECT="$PROJECT" REGION="$REGION" KORA_TAG="$KORA_TAG" \
            doppler run --project "$DOPPLER_PROJECT" --config "$DOPPLER_CONFIG" -- \
            ./infra/kora/cloud-run/deploy.sh

      - name: Notify Slack
        if: always()
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          SERVICE: kora
          ENV: ${{ matrix.env }}
          STATUS: ${{ job.status }}
          VERSION: ${{ steps.tag.outputs.kora_tag }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
        run: ./scripts/notify-slack.sh
