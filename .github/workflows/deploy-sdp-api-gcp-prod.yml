name: Deploy sdp-api to Cloud Run (prod)

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Existing 40-character Git SHA image tag to redeploy (run from main)"
        type: string
        required: true
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: sdp-api-gcp-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production image
    if: >-
      always() &&
      github.repository == 'solana-foundation/solana-developer-platform' &&
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' ||
       startsWith(github.event.head_commit.message, 'chore(main): release '))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: production
    env:
      PROJECT_ID: solana-developer-platform
      REGION: us-central1
      REPO: sdp-prod
      SERVICE: sdp-prod-api-public
      JOB: sdp-prod-api-public-cron
      MIGRATE_JOB: sdp-prod-api-public-migrate
      PII_MIGRATE_JOB: sdp-prod-counterparty-pii-migrate
    steps:
      - name: Validate deploy image SHA
        env:
          DEPLOY_IMAGE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.image_sha || github.sha }}
        run: |
          set -euo pipefail
          if [[ ! "${DEPLOY_IMAGE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "image_sha must be a lowercase 40-character Git SHA." >&2
            exit 1
          fi
          echo "DEPLOY_IMAGE_SHA=${DEPLOY_IMAGE_SHA}" >> "${GITHUB_ENV}"

      - name: Checkout
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.DEPLOY_WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure Docker for Artifact Registry
        if: ${{ github.event_name == 'push' }}
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        if: ${{ github.event_name == 'push' }}
        timeout-minutes: 20
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          VERSION_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/sdp-api-public:${VERSION}"
          SHA_IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/sdp-api-public:${GITHUB_SHA}"
          docker build -f apps/sdp-api/Dockerfile --build-arg GIT_SHA="${GITHUB_SHA}" \
            -t "${VERSION_IMAGE}" -t "${SHA_IMAGE}" .
          docker push "${VERSION_IMAGE}"
          docker push "${SHA_IMAGE}"

      - name: Resolve immutable deploy image
        run: |
          set -euo pipefail
          image_base="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/sdp-api-public"
          tagged_image="${image_base}:${DEPLOY_IMAGE_SHA}"
          resolved_image="$(
            gcloud artifacts docker images describe "${tagged_image}" \
              --project "${PROJECT_ID}" \
              --format='value(image_summary.fully_qualified_digest)'
          )"
          expected_prefix="${image_base}@"
          if [[ "${resolved_image}" != "${expected_prefix}"* ]]; then
            echo "Artifact Registry returned an unexpected image reference for ${tagged_image}." >&2
            exit 1
          fi
          digest="${resolved_image:${#expected_prefix}}"
          if [[ ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Artifact Registry returned an invalid digest for ${tagged_image}." >&2
            exit 1
          fi
          echo "IMAGE=${resolved_image}" >> "${GITHUB_ENV}"
          echo "Deploying ${tagged_image} as ${resolved_image}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Run database migrations
        if: ${{ github.event_name == 'push' }}
        timeout-minutes: 15
        run: |
          gcloud run jobs update "${MIGRATE_JOB}" \
            --region "${REGION}" --project "${PROJECT_ID}" --image "${IMAGE}"
          gcloud run jobs execute "${MIGRATE_JOB}" \
            --region "${REGION}" --project "${PROJECT_ID}" --wait

      - name: Capture rollback state
        run: |
          set -euo pipefail
          service_json="$(
            gcloud run services describe "${SERVICE}" \
              --region "${REGION}" --project "${PROJECT_ID}" --format=json
          )"
          previous_traffic="$(
            jq -er '
              [.status.traffic[]
                | select((.percent // 0) > 0)
                | if (.revisionName // "") != "" then
                    "\(.revisionName)=\(.percent)"
                  else error("active traffic target has no resolved revisionName") end]
              | if length > 0 then join(",") else error("service has no active traffic targets") end
            ' <<<"${service_json}"
          )"
          previous_cron_image="$(
            gcloud run jobs describe "${JOB}" \
              --region "${REGION}" --project "${PROJECT_ID}" \
              --format='value(spec.template.spec.template.spec.containers[0].image)'
          )"
          previous_pii_migrate_image="$(
            gcloud run jobs describe "${PII_MIGRATE_JOB}" \
              --region "${REGION}" --project "${PROJECT_ID}" \
              --format='value(spec.template.spec.template.spec.containers[0].image)'
          )"
          if [[ -z "${previous_cron_image}" ]]; then
            echo "Could not resolve the current cron job image." >&2
            exit 1
          fi
          if [[ -z "${previous_pii_migrate_image}" ]]; then
            echo "Could not resolve the current counterparty PII migration job image." >&2
            exit 1
          fi
          echo "PREVIOUS_TRAFFIC=${previous_traffic}" >> "${GITHUB_ENV}"
          echo "PREVIOUS_CRON_IMAGE=${previous_cron_image}" >> "${GITHUB_ENV}"
          echo "PREVIOUS_PII_MIGRATE_IMAGE=${previous_pii_migrate_image}" >> "${GITHUB_ENV}"

      - name: Deploy candidate without production traffic
        timeout-minutes: 5
        run: |
          set -euo pipefail
          candidate_tag="candidate-${DEPLOY_IMAGE_SHA:0:12}"
          echo "CANDIDATE_TAG=${candidate_tag}" >> "${GITHUB_ENV}"
          echo "ROLLOUT_STARTED=true" >> "${GITHUB_ENV}"
          gcloud run services update "${SERVICE}" \
            --region "${REGION}" --project "${PROJECT_ID}" --image "${IMAGE}" \
            --no-traffic --tag "${candidate_tag}"

          service_json="$(
            gcloud run services describe "${SERVICE}" \
              --region "${REGION}" --project "${PROJECT_ID}" --format=json
          )"
          candidate_revision="$(
            jq -er --arg tag "${candidate_tag}" '
              [.status.traffic[] | select(.tag == $tag)][0].revisionName
                // error("candidate traffic tag is missing a revision")
            ' <<<"${service_json}"
          )"
          revision_digest="$(
            gcloud run revisions describe "${candidate_revision}" \
              --region "${REGION}" --project "${PROJECT_ID}" \
              --format='value(status.imageDigest)'
          )"
          expected_digest="${IMAGE##*@}"
          if [[ "${revision_digest##*@}" != "${expected_digest}" ]]; then
            echo "Candidate ${candidate_revision} resolved to ${revision_digest}, expected ${expected_digest}." >&2
            exit 1
          fi
          echo "CANDIDATE_REVISION=${candidate_revision}" >> "${GITHUB_ENV}"
          echo "Candidate revision: ${candidate_revision}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify candidate revision readiness
        timeout-minutes: 5
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            revision_json="$(
              gcloud run revisions describe "${CANDIDATE_REVISION}" \
                --region "${REGION}" --project "${PROJECT_ID}" --format=json
            )"
            if jq -e '
              [.status.conditions[]
                | select(.type == "Ready" and .status == "True")]
              | length == 1
            ' <<<"${revision_json}" >/dev/null; then
              echo "Candidate ${CANDIDATE_REVISION} is ready to serve traffic."
              exit 0
            fi
            if [[ "${attempt}" -eq 12 ]]; then
              echo "Candidate revision did not become ready after ${attempt} attempts." >&2
              false
            fi
            sleep 10
          done

      - name: Promote service and cron with rollback
        timeout-minutes: 10
        run: |
          set -euo pipefail

          gcloud run services update-traffic "${SERVICE}" \
            --region "${REGION}" --project "${PROJECT_ID}" \
            --to-revisions "${CANDIDATE_REVISION}=100"

          for attempt in {1..12}; do
            if response="$(
              curl --fail --silent --show-error --max-time 10 \
                "https://api.solana.com/health/ready"
            )" && jq -e --arg revision "${CANDIDATE_REVISION}" '
              .status == "ready"
              and .revision == $revision
              and .checks.database == "ok"
              and .checks.redis == "ok"
            ' <<<"${response}" >/dev/null; then
              break
            fi
            if [[ "${attempt}" -eq 12 ]]; then
              echo "Canonical production traffic did not reach ${CANDIDATE_REVISION}." >&2
              false
            fi
            sleep 10
          done

          gcloud run jobs update "${JOB}" \
            --region "${REGION}" --project "${PROJECT_ID}" --image "${IMAGE}"
          gcloud run jobs update "${PII_MIGRATE_JOB}" \
            --region "${REGION}" --project "${PROJECT_ID}" --image "${IMAGE}"
          echo "ROLLOUT_COMPLETE=true" >> "${GITHUB_ENV}"

      - name: Roll back incomplete rollout
        if: ${{ always() }}
        timeout-minutes: 5
        run: |
          set -uo pipefail
          if [[ "${ROLLOUT_STARTED:-}" != "true" || "${ROLLOUT_COMPLETE:-}" == "true" ]]; then
            exit 0
          fi

          echo "Rollout did not complete; restoring service traffic and cron image." >&2
          rollback_failed=0
          gcloud run services update-traffic "${SERVICE}" \
            --region "${REGION}" --project "${PROJECT_ID}" \
            --to-revisions "${PREVIOUS_TRAFFIC}" || rollback_failed=1
          gcloud run jobs update "${JOB}" \
            --region "${REGION}" --project "${PROJECT_ID}" \
            --image "${PREVIOUS_CRON_IMAGE}" || rollback_failed=1
          gcloud run jobs update "${PII_MIGRATE_JOB}" \
            --region "${REGION}" --project "${PROJECT_ID}" \
            --image "${PREVIOUS_PII_MIGRATE_IMAGE}" || rollback_failed=1
          if [[ "${rollback_failed}" -ne 0 ]]; then
            echo "Automatic rollback was incomplete; escalate immediately." >&2
            exit 1
          fi

      - name: Remove candidate traffic tag
        if: ${{ always() }}
        timeout-minutes: 5
        run: |
          set -euo pipefail
          if [[ -z "${CANDIDATE_TAG:-}" ]]; then
            exit 0
          fi
          gcloud run services update-traffic "${SERVICE}" \
            --region "${REGION}" --project "${PROJECT_ID}" \
            --remove-tags "${CANDIDATE_TAG}"
