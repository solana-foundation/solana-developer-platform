name: Release Flow

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  plan:
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.plan.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Plan release
        id: plan
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/release-flow.mjs plan

  prepare-release-pr:
    needs: plan
    if: ${{ needs.plan.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: release-flow-main
      cancel-in-progress: false
    steps:
      - name: Create release app token
        id: release-app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.release-app.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Prepare release PR
        env:
          GITHUB_TOKEN: ${{ steps.release-app.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/release-flow.mjs prepare

  publish-release:
    if: "${{ startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    concurrency:
      group: release-flow-main
      cancel-in-progress: false
    steps:
      - name: Create release app token
        id: release-app
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.release-app.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Publish release tag and GitHub release
        env:
          GITHUB_TOKEN: ${{ steps.release-app.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/release-flow.mjs publish
