services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sdp
      POSTGRES_USER: sdp
      POSTGRES_PASSWORD: sdp
    ports:
      - "${SDP_POSTGRES_PORT:-5432}:5432"
    volumes:
      - sdp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdp -d sdp"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${SDP_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  sdp-migrate:
    build:
      context: .
      dockerfile: apps/sdp-api/Dockerfile
      target: builder
    working_dir: /repo/apps/sdp-api
    command: ["node", "scripts/migrate-postgres.mjs"]
    environment:
      DATABASE_URL: postgresql://sdp:sdp@postgres:5432/sdp
    depends_on:
      postgres:
        condition: service_healthy

  sdp-api:
    build:
      context: .
      dockerfile: apps/sdp-api/Dockerfile
    restart: unless-stopped
    ports:
      - "${SDP_API_PORT:-8787}:8787"
    environment:
      # Core
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_VERSION: ${API_VERSION:-local-compose}
      SDP_RUNTIME: node
      SDP_DEPLOYMENT_MODE: ${SDP_DEPLOYMENT_MODE:-self_hosted}
      DATABASE_URL: postgresql://sdp:sdp@postgres:5432/sdp
      REDIS_URL: redis://redis:6379

      # Clerk authentication
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}

      # App secrets
      API_KEY_PEPPER: ${API_KEY_PEPPER:-}
      CUSTODY_ENCRYPTION_KEY: ${CUSTODY_ENCRYPTION_KEY:-}

      # Solana
      SOLANA_NETWORK: ${SOLANA_NETWORK:-devnet}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}

      # Signing
      SIGNING_PROVIDER: ${SIGNING_PROVIDER:-local}
      FEE_PAYER_PRIVATE_KEY: ${FEE_PAYER_PRIVATE_KEY:-}
      FEE_PAYMENT_PROVIDER: ${FEE_PAYMENT_PROVIDER:-native}

      # Observability (optional)
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sdp-migrate:
        condition: service_completed_successfully

  sdp-web:
    build:
      context: .
      dockerfile: apps/sdp-web/Dockerfile
      args:
        NEXT_PUBLIC_SDP_API_BASE_URL: ${NEXT_PUBLIC_SDP_API_BASE_URL:-http://localhost:8787}
        NEXT_PUBLIC_SDP_DOCS_URL: ${NEXT_PUBLIC_SDP_DOCS_URL:-http://localhost:3001}
        NEXT_PUBLIC_SOLANA_NETWORK: ${NEXT_PUBLIC_SOLANA_NETWORK:-devnet}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    ports:
      - "${SDP_WEB_PORT:-3000}:3000"
    environment:
      SDP_API_BASE_URL: http://sdp-api:8787
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_JWT_TEMPLATE: ${CLERK_JWT_TEMPLATE:-sdp-api}
    depends_on:
      sdp-api:
        condition: service_healthy

  sdp-docs:
    build:
      context: .
      dockerfile: apps/sdp-docs/Dockerfile
      args:
        NEXT_PUBLIC_SDP_WEB_URL: ${NEXT_PUBLIC_SDP_WEB_URL:-http://localhost:3000}
        NEXT_PUBLIC_SDP_DOCS_URL: ${NEXT_PUBLIC_SDP_DOCS_URL:-http://localhost:3001}
        NEXT_PUBLIC_SDP_API_URL: ${NEXT_PUBLIC_SDP_API_URL:-http://localhost:8787}
    restart: unless-stopped
    ports:
      - "${SDP_DOCS_PORT:-3001}:3001"

volumes:
  sdp-postgres-data:
